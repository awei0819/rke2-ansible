# 节点架构，可混合架构部署amd64/arm64
master_arch: "amd64"
worker_arch: "amd64"

# 本机IP,master1，必填
local_address: 192.168.80.32

# master主机列表:ssh端口,master1需要写在第一个
master:
  - 192.168.80.31:8022
  - 192.168.80.32:8022
  - 192.168.80.33:8022

# worker主机列表:ssh端口，没有worker节点可以注释或删除
worker:
  - 192.168.80.34:8022

# 全局数据目录,结尾必须为rke2
data_dir: /data/rke2

# cni calico[暂只支持calico]
cni: calico

# 有不同网卡可适配多个，逗号分隔，只适用calico
calico_net: ens*

# ingress部署开关
master_ingress: true
worker_ingress: false

# 镜像仓库配置
registries:
  mirrors:
    docker.io:
      endpoint:
        - https://docker.mirrors.ustc.edu.cn
        - https://registry.aliyuncs.com
    reg.test.com:
      endpoint:
        - https://reg.test.com
  configs:
    reg.test.com:
      auth:
        username: "admin"
        password: "Hbqwer_1567_dsao32!"
      tls:
        insecure_skip_verify: true
        #cert_file: /path/to/cert.crt
        #key_file: /path/to/key.key

# ---------- Master VIP 高可用配置 ----------
# 需提前部署keepalived或准备好LB的IP地址确认负载没问题，负载端口为：9345、6443
master_vip:
  # 是否启用VIP（true/false）
  enable: false
  # VIP 地址
  vip: 192.168.80.91

# ---------- RKE2 自定义配置 ----------
rke2_master_config:
  etcd-arg:
    - "--listen-metrics-urls=http://0.0.0.0:2381"
  kube-proxy-arg:
    - "--metrics-bind-address=0.0.0.0:10249"
  kube-controller-manager-arg:
    - "--bind-address=0.0.0.0"
  kube-scheduler-arg:
    - "--bind-address=0.0.0.0"
  # 集群创建后，不建议修改网络配置
  # 用于 Pod IP 的 IPv4/IPv6 网络 CIDR（默认值：10.42.0.0/16）
  cluster-cidr: 10.42.0.0/16
  # 用于 Service IP 的 IPv4/IPv6 网络 CIDR（默认值：10.43.0.0/16）
  service-cidr: 10.43.0.0/16
  kube-apiserver-arg:
    - "service-node-port-range=20000-65535"
  # etcd快照保留个数，默认12小时一个备份
  etcd-snapshot-retention: 10


rke2_worker_config:
  kube-proxy-arg:
    - "--metrics-bind-address=0.0.0.0:10249"
